name: DevOps Monitoring CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Check README exists
        run: test -f README.md

      - name: Check prometheus config exists
        run: test -f prometheus.yml

      - name: Check docker compose config exists
        run: test -f docker-compose.yaml

      - name: Validate docker compose
        run: docker compose -f docker-compose.yaml config
